# Namespace (optional if already created)
apiVersion: v1
kind: Namespace
metadata:
  name: prod-app
---
# Spring Boot Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: prod-app
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
# Spring Boot Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: prod-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: repo12.azurecr.io/spring-image:v1.0
          ports:
            - containerPort: 8080
---
# Ingress for Spring Boot Backend (using AGIC)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: prod-app
  annotations:
    kubernetes.io/ingress.class: azure-application-gateway
spec:
  ingressClassName: azure-application-gateway
  rules:
    - http:
        paths:
          - path: /   ##/api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
