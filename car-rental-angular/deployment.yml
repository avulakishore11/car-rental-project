# ───────────────────────────────────────────────
# 1. Namespace
# ───────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: car-rental-ns

---
# ───────────────────────────────────────────────
# 2. Angular Frontend Deployment
# ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-frontend-deployment
  namespace: car-rental-ns
  labels:
    app: angular-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: angular-frontend
  template:
    metadata:
      labels:
        app: angular-frontend
    spec:
      containers:
        - name: angular-container
          image: repo12.azurecr.io/angular-image:v1.0
          ports:
            - containerPort: 80

---
# ───────────────────────────────────────────────
# 3. Service for Angular Frontend
# ───────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: angular-frontend-service
  namespace: car-rental-ns
spec:
  type: ClusterIP
  selector:
    app: angular-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
# ───────────────────────────────────────────────
# 4. Ingress Rule (AGIC)
# ───────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: angular-frontend-ingress
  namespace: car-rental-ns
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  ingressClassName: azureapplicationgateway
  rules:
    - host: gscncmhgeah9ccbz.fz26.alb.azure.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: angular-frontend-service
                port:
                  number: 80

---
# ───────────────────────────────────────────────
# 5. AGIC ConfigMap (AGW details)
# ───────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: agic-config
  namespace: kube-system
data:
  appgw.name: dev-AGW
  appgw.resourceGroup: dev-rg
  appgw.subscriptionId: dcbe3ad5-13da-49c6-b060-fc78bd43b8a7
  appgw.usePrivateIP: "false"
  armAuth.type: aadPodIdentity
  watchNamespace: ""
  ingressClass: azureapplicationgateway
  verbosityLevel: "3"

---
# ───────────────────────────────────────────────
# 6. IngressClass definition for AGIC
# ───────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: azureapplicationgateway
spec:
  controller: azure/application-gateway

---
# ───────────────────────────────────────────────
# 7. AGIC Deployment (runs in kube-system)
# ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-azure
  namespace: kube-system
  labels:
    app: ingress-azure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-azure
  template:
    metadata:
      labels:
        app: ingress-azure
    spec:
      containers:
        - name: ingress-azure
          image: mcr.microsoft.com/azure-application-gateway/kubernetes-ingress:v1.9.0
          args:
            - --in-cluster
            - --configmap=kube-system/agic-config
