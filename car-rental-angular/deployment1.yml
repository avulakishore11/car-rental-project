## Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: dev-ns
---
## Service
apiVersion: v1
kind: Service
metadata:
  name: angular-service
  namespace: dev-ns
spec:
  selector:
    app: car-rental
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
## Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-deployment
  namespace: dev-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: car-rental
  template:
    metadata:
      labels:
        app: car-rental
    spec:
      containers:
      - name: angular-container
        image: repo12.azurecr.io/angular-image:v1.0
        ports:
        - containerPort: 80
---
## Ingress for AGIC
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: angular-ingress
  namespace: dev-ns
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  ingressClassName: azure/application-gateway
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: angular-service
            port:
              number: 80
